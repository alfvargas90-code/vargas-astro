<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Vargas Family Astrology</title>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --bg: #000000;
  --panel: rgba(4,4,12,0.82);
  --panel2: rgba(6,6,18,0.88);
  --border: rgba(40,40,80,0.7);
  --text: #d8d8f0;
  --muted: #6868a0;
  --gold: #f0b429;
  --c: #6366f1;
  --c-dim: rgba(99,102,241,0.12);
}

body {
  background: #000;
  color: var(--text);
  font-family: Georgia, 'Times New Roman', serif;
  min-height: 100vh;
  padding: 14px 20px 40px;
}

/* ── Header ── */
.hdr { text-align: center; padding: 18px 16px 10px; }
.hdr h1 { font-size: 20px; letter-spacing: 5px; color: var(--gold); text-transform: uppercase; font-weight: normal; }
.hdr .sub { font-size: 10px; color: var(--muted); margin-top: 3px; letter-spacing: 1px; font-style: italic; }
.hdr .date-now { font-size: 10px; color: var(--muted); margin-top: 2px; }

/* ── Body & main ── */
body { background: #000; color: var(--text); font-family: Georgia, 'Times New Roman', serif; min-height: 100vh; padding: 0 0 88px; }
#main { display: flex; flex-direction: column; gap: 12px; max-width: 600px; margin: 0 auto; padding: 0 12px 16px; }

/* ── Bottom nav ── */
#bottom-nav {
  position: fixed; bottom: 0; left: 0; right: 0; z-index: 100;
  display: flex; justify-content: space-around;
  background: rgba(4,4,12,0.96); border-top: 1px solid rgba(40,40,80,0.8);
  backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);
  padding: 10px 0 max(env(safe-area-inset-bottom, 0px), 10px);
}
.bnav-item { flex: 1; display: flex; flex-direction: column; align-items: center; gap: 4px; cursor: pointer; padding: 4px 8px; transition: all 0.2s; }
.bnav-bar { height: 3px; width: 20px; border-radius: 2px; background: var(--muted); transition: all 0.25s; }
.bnav-item.active .bnav-bar { width: 32px; }
.bnav-name { font-size: 14px; font-weight: bold; color: var(--muted); letter-spacing: 0.5px; transition: color 0.2s; }
.bnav-item.active .bnav-name { color: var(--c); }
.bnav-big3 { font-size: 9px; color: var(--muted); opacity: 0; transition: opacity 0.2s; text-align: center; line-height: 1.4; }
.bnav-item.active .bnav-big3 { opacity: 0.55; }

/* ── Cards ── */
.card { background: var(--panel); border: 1px solid var(--border); border-radius: 14px; overflow: hidden; backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px); }
.card-hdr { background: var(--panel2); border-bottom: 1px solid var(--border); padding: 9px 16px; font-family: Arial, sans-serif; font-size: 10px; letter-spacing: 2px; text-transform: uppercase; color: var(--c); }
.card-body { padding: 14px 16px; }

/* ── Hero ── */
.hero-name { font-size: 30px; font-weight: bold; color: var(--c); letter-spacing: 2px; }
.hero-birth { font-size: 11px; color: var(--muted); margin-top: 3px; margin-bottom: 16px; }
.ruler-badge { display: inline-block; background: var(--c-dim); border: 1px solid rgba(99,102,241,0.3); border-radius: 20px; padding: 4px 12px; font-size: 11px; color: var(--c); margin-top: 14px; }

/* ── Big Three ── */
.big3 { display: flex; gap: 8px; }
.b3-item { flex: 1; background: var(--panel2); border-radius: 12px; padding: 12px 8px; text-align: center; border: 1px solid var(--border); min-width: 0; }
.b3-label { font-size: 9px; color: var(--muted); letter-spacing: 1px; text-transform: uppercase; font-family: Arial, sans-serif; }
.b3-glyph { font-size: 22px; margin: 6px 0 3px; }
.b3-sign { font-size: 13px; color: var(--c); font-weight: bold; }
.b3-keywords { font-size: 9px; color: var(--muted); margin-top: 3px; font-family: Arial, sans-serif; }
.b3-flavor { font-size: 11px; color: var(--text); margin-top: 8px; line-height: 1.5; opacity: 0.85; text-align: left; border-top: 1px solid var(--border); padding-top: 8px; }

/* ── Horoscope ── */
.horo-meta { display: flex; align-items: center; gap: 8px; margin-bottom: 12px; flex-wrap: wrap; }
.horo-date { font-size: 11px; color: var(--muted); font-family: Arial, sans-serif; }
.horo-theme { display: inline-flex; align-items: center; gap: 5px; border-radius: 20px; padding: 3px 10px; font-size: 10px; font-family: Arial, sans-serif; letter-spacing: 1px; text-transform: uppercase; border: 1px solid; }
.horo-opening { font-size: 13px; line-height: 1.75; color: var(--text); margin-bottom: 10px; font-style: italic; }
.horo-body { font-size: 12.5px; line-height: 1.75; color: #b0b0cc; margin-bottom: 10px; }
.horo-closing { font-size: 12px; font-style: italic; color: var(--gold); border-top: 1px solid var(--border); padding-top: 10px; opacity: 0.9; }

/* ── Info panel ── */
#info { display: flex; flex-direction: column; gap: 12px; }

/* ── Clusters ── */
.cluster-list { list-style: none; }
.cluster-list li { padding: 10px 0; border-bottom: 1px solid rgba(30,30,64,0.5); }
.cluster-list li:last-child { border-bottom: none; }
.cluster-row { display: flex; align-items: center; gap: 6px; margin-bottom: 5px; flex-wrap: wrap; }
.cluster-title { font-size: 13px; }
.cluster-tag { display: inline-block; background: var(--c-dim); color: var(--c); border-radius: 4px; padding: 2px 7px; font-size: 9px; font-family: Arial, sans-serif; letter-spacing: 0.5px; text-transform: uppercase; flex-shrink: 0; }
.crit-tag { background: rgba(240,180,41,0.15); color: var(--gold); }
.cluster-meaning { font-size: 12px; color: var(--text); opacity: 0.8; line-height: 1.6; }

/* ── Themes ── */
.themes { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
.theme-box { background: var(--panel2); border-radius: 10px; padding: 12px 14px; border: 1px solid var(--border); }
.theme-label { font-size: 9px; color: var(--c); letter-spacing: 1px; text-transform: uppercase; font-family: Arial, sans-serif; margin-bottom: 5px; }
.theme-text { font-size: 12px; color: var(--muted); line-height: 1.5; }

/* ── Summary ── */
.summary-text { font-size: 13px; line-height: 1.75; color: var(--text); }

/* ── Collapsible ── */
.section-hdr { display: flex; align-items: center; justify-content: space-between; cursor: pointer; user-select: none; padding: 11px 16px; background: var(--panel2); font-family: Arial, sans-serif; font-size: 10px; letter-spacing: 2px; text-transform: uppercase; color: var(--c); border-bottom: 1px solid transparent; transition: border-color 0.2s; }
.section-hdr.open { border-bottom-color: var(--border); }
.section-arrow { font-size: 10px; transition: transform 0.25s; opacity: 0.5; }
.section-hdr.open .section-arrow { transform: rotate(180deg); }
.section-body { display: none; }
.section-body.open { display: block; }

/* ── Live sky ── */
#live-sky-grid { display: flex; flex-direction: column; gap: 0; padding: 4px 0 6px; }
.ls-row { display: flex; align-items: center; gap: 10px; padding: 8px 16px; border-bottom: 1px solid rgba(255,255,255,0.05); transition: background 0.15s; }
.ls-row:last-child { border-bottom: none; }
.ls-row:hover { background: rgba(255,255,255,0.04); }
.ls-glyph { font-size: 18px; width: 22px; text-align: center; flex-shrink: 0; }
.ls-body { flex: 1; min-width: 0; }
.ls-name { font-size: 11px; color: var(--muted); text-transform: uppercase; letter-spacing: 0.6px; line-height: 1; margin-bottom: 2px; display: flex; align-items: baseline; gap: 6px; flex-wrap: wrap; }
.ls-domain { font-size: 9.5px; color: var(--muted); opacity: 0.55; text-transform: none; letter-spacing: 0; font-style: italic; font-weight: normal; white-space: nowrap; }
.ls-pos { font-size: 13px; color: #fff; font-family: Arial,sans-serif; font-weight: 500; }
.ls-rx { font-size: 9px; color: #e05c5c; margin-left: 4px; }
.ls-key  { font-size: 11px; color: var(--gold); opacity: 0.85; line-height: 1.3; margin-top: 2px; }
.ls-feel  { font-size: 11px; color: var(--text); opacity: 0.68; line-height: 1.5; margin-top: 3px; font-style: italic; }
.ls-house-badge   { font-size: 10.5px; color: var(--c); margin-top: 5px; line-height: 1.4; opacity: 0.9; }
.ls-house-badge strong { font-style: normal; font-weight: bold; }
.ls-house-transit { font-size: 11px; color: var(--text); opacity: 0.75; line-height: 1.55; margin-top: 3px; border-left: 2px solid var(--c); padding-left: 8px; margin-left: 2px; }

/* Aspects */
.ls-aspect-hdr { padding: 10px 16px 6px; font-family: Arial, sans-serif; font-size: 9px; letter-spacing: 2px; text-transform: uppercase; color: var(--muted); border-top: 1px solid rgba(255,255,255,0.08); margin-top: 4px; }
.ls-asp-row { padding: 10px 16px 12px; border-bottom: 1px solid rgba(255,255,255,0.05); }
.ls-asp-row:last-child { border-bottom: none; }
.ls-asp-head { display: flex; align-items: baseline; justify-content: space-between; flex-wrap: wrap; gap: 4px; margin-bottom: 4px; }
.ls-asp-planets { font-size: 13px; color: #fff; font-weight: 500; }
.ls-asp-sym { font-size: 15px; color: var(--c); margin: 0 2px; }
.ls-asp-meta { font-size: 9px; color: var(--muted); font-family: Arial, sans-serif; letter-spacing: 0.5px; white-space: nowrap; }
.ls-asp-activation { font-size: 11.5px; color: var(--gold); margin-bottom: 3px; }
.ls-asp-activation strong { font-style: normal; }
.ls-asp-feel { font-size: 11px; color: var(--text); opacity: 0.65; line-height: 1.55; font-style: italic; }
.ls-asp-orb { font-size: 10px; color: var(--text); opacity: 0.55; margin-top: 4px; padding: 3px 8px; background: rgba(255,255,255,0.04); border-radius: 4px; display: inline-block; }

/* ── Wheel ── */
#wheel-wrap { position: relative; max-width: 480px; margin: 0 auto; width: 100%; padding: 12px; }
canvas#wheel { display: block; width: 100%; height: auto; }
#tip { position: absolute; background: rgba(6,6,18,0.97); border: 1px solid var(--c); border-radius: 10px; padding: 8px 12px; font-size: 12px; pointer-events: none; white-space: nowrap; display: none; z-index: 20; line-height: 1.6; box-shadow: 0 4px 20px rgba(0,0,0,0.6); }
#tip .tp-name { font-weight: bold; color: var(--c); font-size: 14px; }
#tip .tp-pos { color: var(--gold); }
#tip .tp-house { color: var(--muted); font-size: 11px; }

/* ── Planet table ── */
.ptable { width: 100%; border-collapse: collapse; font-size: 12px; }
.ptable th { font-family: Arial, sans-serif; font-size: 9px; letter-spacing: 1px; text-transform: uppercase; color: var(--muted); padding: 4px 6px; border-bottom: 1px solid var(--border); text-align: left; }
.ptable td { padding: 6px 6px; border-bottom: 1px solid rgba(30,30,64,0.5); vertical-align: middle; }
.ptable tr:last-child td { border-bottom: none; }
.ptable tr:hover td { background: rgba(99,102,241,0.06); }
.ptable th:first-child, .ptable td:first-child { position: sticky; left: 0; z-index: 2; background: rgba(4,4,12,0.97); min-width: 28px; }
.ptable th:nth-child(2), .ptable td:nth-child(2) { position: sticky; left: 36px; z-index: 2; background: rgba(4,4,12,0.97); }
.p-glyph { font-size: 16px; width: 24px; text-align: center; }
.p-name { font-weight: bold; white-space: nowrap; }
.p-rx { font-size: 9px; color: #e05c5c; margin-left: 3px; }
.p-sign { color: var(--gold); white-space: nowrap; }
.p-house { color: var(--muted); font-size: 11px; font-family: Arial, sans-serif; white-space: nowrap; }
.p-flavor { font-size: 10px; color: var(--muted); line-height: 1.4; }
.p-pmean { font-size: 10px; color: var(--text); opacity: 0.75; white-space: nowrap; }
.p-hmean { font-size: 10px; color: var(--text); opacity: 0.75; }
.el-fire { color: #ff6b4a; } .el-earth { color: #52c98b; }
.el-air  { color: #4ec3f8; } .el-water { color: #a78bfa; }

/* ── Desktop ── */
@media (min-width: 900px) {
  body { padding: 0 0 40px; }
  #main { max-width: 820px; padding: 0 24px 24px; }
  #bottom-nav { position: static; background: transparent; border: none; backdrop-filter: none; -webkit-backdrop-filter: none; padding: 16px 24px 0; max-width: 820px; margin: 0 auto; justify-content: center; gap: 12px; }
  .bnav-item { flex: none; flex-direction: row; background: var(--panel); border: 2px solid var(--border); border-radius: 14px; padding: 8px 20px; min-width: 160px; justify-content: center; gap: 8px; }
  .bnav-item.active { border-color: var(--c); background: var(--c-dim); }
  .bnav-bar { display: none; }
  .bnav-name { font-size: 16px; }
  .bnav-big3 { opacity: 0.5; font-size: 10px; }
  .bnav-item.active .bnav-big3 { opacity: 0.7; }
  .section-body { display: block !important; }
  .section-arrow { display: none; }
  #wheel-wrap { max-width: 520px; }
}
</style>
</head>

function calcAspects(planets) {
  const results = [];
  for (let i = 0; i < planets.length; i++) {
    for (let j = i + 1; j < planets.length; j++) {
      const p1 = planets[i], p2 = planets[j];
      const raw  = Math.abs(((p1.lon - p2.lon) % 360 + 360) % 360);
      const diff = raw > 180 ? 360 - raw : raw;
      for (const asp of ASPECT_DEFS) {
        const orb = Math.abs(diff - asp.deg);
        if (orb <= asp.orb) {
          const pairKey = [p1.name, p2.name].join('-');
          const pairRev = [p2.name, p1.name].join('-');
          const activation = ASPECT_PAIR[pairKey] || ASPECT_PAIR[pairRev]
            || `${PLANET_DOMAIN[p1.name] || p1.name} and ${PLANET_DOMAIN[p2.name] || p2.name}`;
          results.push({ p1, p2, asp, orb: +orb.toFixed(1), activation });
          break;
        }
      }
    }
  }
  return results.sort((a, b) => a.orb - b.orb);
}

}

//  Horoscope engine
// ─────────────────────────────────────────────
function getDayOfYear(d) {
  return Math.floor((d - new Date(d.getFullYear(), 0, 0)) / 86400000);
}
function rng(seed) {
  const x = Math.sin(seed + 1.618) * 10000;
  return x - Math.floor(x);
}
function pick(arr, seed) {
  return arr[Math.floor(rng(seed) * arr.length)];
}

function buildHoroscope(risingSign, date) {
  const doy = getDayOfYear(date);
  const si  = SIGN_NAMES.indexOf(risingSign);
  const base = doy * 137 + si * 31; // 137 = golden angle-ish prime

  const horo  = HORO[risingSign] || HORO['Capricorn'];
  const theme = pick(DAY_THEMES, base + 5);

  return {
    opening: pick(horo.open,  base),
    middle:  pick(horo.mid,   base + 11),
    closing: pick(horo.close, base + 23),
    theme,
  };
}

function renderHoroscope(child, date) {
  const risingSign = child.bigThree.asc;
  const { opening, middle, closing, theme } = buildHoroscope(risingSign, date);

  document.getElementById('horo-hdr').textContent =
    `Daily Horoscope · ${risingSign} Rising`;
  document.getElementById('horo-hdr').style.color = child.color;

  const dateStr = date.toLocaleDateString('en-US', { weekday:'long', month:'long', day:'numeric', year:'numeric' });

  document.getElementById('horo-body').innerHTML = `
    <div class="horo-meta">
      <span class="horo-date">${dateStr}</span>
      <span class="horo-theme" style="color:${theme.color};border-color:${theme.color}44;background:${theme.color}15">
        ${theme.icon} ${theme.name}
      </span>
    </div>
    <div class="horo-opening">${opening}</div>
    <div class="horo-body">${middle}</div>
    <div class="horo-closing">${closing}</div>
  `;
}

let active = 'suri';
const W = 500, H = 500, CX = 250, CY = 250, R = 240;

// ─────────────────────────────────────────────
//  Geometry
// ─────────────────────────────────────────────
function lonToAngle(lon, ascLon) { return Math.PI + ((lon - ascLon) * Math.PI / 180); }
function polarXY(angle, r)       { return { x: CX + r * Math.cos(angle), y: CY + r * Math.sin(angle) }; }
function normAngle(a)            { return ((a % (2*Math.PI)) + 2*Math.PI) % (2*Math.PI); }

// ─────────────────────────────────────────────
//  Draw chart
// ─────────────────────────────────────────────
function drawChart(child) {
  const canvas = document.getElementById('wheel');
  if (!canvas) return;
  const ctx = canvas.getContext('2d');
  ctx.clearRect(0, 0, W, H);
  const cc = child.color;

  // Background — transparent so galaxy shows through
  ctx.beginPath(); ctx.arc(CX, CY, R, 0, 2*Math.PI);
  ctx.strokeStyle = cc + '55'; ctx.lineWidth = 1.5; ctx.stroke();

  const SIGN_R1 = R * 0.82, SIGN_R2 = R * 0.98, GLYPH_R = R * 0.90;
  const PLR = R * 0.64, PLR2 = R * 0.55;
  const HOUSE_R1 = R * 0.20, HOUSE_R2 = R * 0.80;

  // Sign ring
  for (let i = 0; i < 12; i++) {
    const a1 = lonToAngle(i * 30, child.ascLon);
    const a2 = lonToAngle((i+1) * 30, child.ascLon);
    const el = ELEMENTS[i];

    ctx.beginPath();
    ctx.arc(CX, CY, SIGN_R2, a1, a2, false);
    ctx.arc(CX, CY, SIGN_R1, a2, a1, true);
    ctx.closePath();
    ctx.fillStyle = EL_COLORS[el] + '22'; ctx.fill();
    ctx.strokeStyle = '#ffffff12'; ctx.lineWidth = 0.5; ctx.stroke();

    // Divider
    const d1 = polarXY(a1, SIGN_R1), d2 = polarXY(a1, SIGN_R2);
    ctx.beginPath(); ctx.moveTo(d1.x, d1.y); ctx.lineTo(d2.x, d2.y);
    ctx.strokeStyle = '#ffffff18'; ctx.lineWidth = 0.5; ctx.stroke();

    // Glyph
    const ga = lonToAngle(i * 30 + 15, child.ascLon);
    const gp = polarXY(ga, GLYPH_R);
    ctx.font = '14px serif'; ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
    ctx.fillStyle = EL_COLORS[el] + 'cc';
    ctx.fillText(SIGN_GLYPHS[i], gp.x, gp.y);
  }

  // Inner ring border
  ctx.beginPath(); ctx.arc(CX, CY, SIGN_R1, 0, 2*Math.PI);
  ctx.strokeStyle = cc + '33'; ctx.lineWidth = 1; ctx.stroke();

  // House lines (equal)
  for (let h = 0; h < 12; h++) {
    const ha = lonToAngle(child.ascLon + h * 30, child.ascLon);
    const p1 = polarXY(ha, HOUSE_R1), p2 = polarXY(ha, HOUSE_R2);
    const isAngle = h % 3 === 0;
    ctx.beginPath(); ctx.moveTo(p1.x, p1.y); ctx.lineTo(p2.x, p2.y);
    ctx.strokeStyle = isAngle ? cc + '60' : cc + '22';
    ctx.lineWidth   = isAngle ? 1.2 : 0.5; ctx.stroke();

    // House numeral
    const na = lonToAngle(child.ascLon + h * 30 + 15, child.ascLon);
    const np = polarXY(na, R * 0.38);
    ctx.font = '10px Arial'; ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
    ctx.fillStyle = cc + '50';
    ctx.fillText(['I','II','III','IV','V','VI','VII','VIII','IX','X','XI','XII'][h], np.x, np.y);
  }

  // Angle labels
  ctx.beginPath(); ctx.arc(CX, CY, HOUSE_R1, 0, 2*Math.PI);
  ctx.strokeStyle = cc + '40'; ctx.lineWidth = 1; ctx.stroke();

  [{ label:'ASC', lon:child.ascLon }, { label:'IC', lon:child.ascLon+90 },
   { label:'DSC', lon:child.ascLon+180 }, { label:'MC', lon:child.mcLon }]
  .forEach(({label, lon}) => {
    const a = lonToAngle(lon, child.ascLon);
    const p = polarXY(a, R * 0.99);
    ctx.font = 'bold 9px Arial'; ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
    ctx.fillStyle = cc + 'cc';
    ctx.fillText(label, p.x, p.y);
  });

  // Planet boundary ring
  ctx.beginPath(); ctx.arc(CX, CY, R * 0.78, 0, 2*Math.PI);
  ctx.strokeStyle = cc + '15'; ctx.lineWidth = 0.5; ctx.stroke();

  // Planets with collision avoidance
  const sorted = [...child.planets].sort((a, b) => a.lon - b.lon);
  const placed = [];

  sorted.forEach(p => {
    const pa = lonToAngle(p.lon, child.ascLon);
    let useR = PLR;
    const crowded = placed.filter(q => {
      let d = Math.abs(normAngle(pa) - normAngle(q.a));
      if (d > Math.PI) d = 2*Math.PI - d;
      return d < 0.36;
    });
    if (crowded.length > 0) {
      const usedR = crowded.map(q => q.r);
      useR = usedR.includes(PLR) ? PLR2 : PLR;
    }
    placed.push({ p, a: pa, r: useR });
  });

  placed.forEach(({ p, a, r }) => {
    const pt = polarXY(a, r);
    const tk = polarXY(a, SIGN_R1 - 4);

    ctx.beginPath(); ctx.moveTo(pt.x, pt.y); ctx.lineTo(tk.x, tk.y);
    ctx.strokeStyle = cc + '22'; ctx.lineWidth = 0.5; ctx.stroke();

    ctx.beginPath(); ctx.arc(pt.x, pt.y, 11, 0, 2*Math.PI);
    ctx.fillStyle = 'rgba(0,0,0,0.65)'; ctx.fill();
    ctx.strokeStyle = cc + '60'; ctx.lineWidth = 1; ctx.stroke();

    const gl = PLANET_GLYPHS[p.name] || p.name[0];
    ctx.font = '13px serif'; ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
    ctx.fillStyle = (p.name === 'Sun' || p.name === 'Moon') ? '#f0b429' : cc;
    ctx.fillText(gl, pt.x, pt.y);

    if (p.rx) {
      ctx.font = '7px Arial'; ctx.fillStyle = '#e05c5c';
      ctx.fillText('℞', pt.x + 9, pt.y - 9);
    }
    p._cx = pt.x; p._cy = pt.y; p._r = 13;
  });

  // MC dashed line
  const mca = lonToAngle(child.mcLon, child.ascLon);
  const mp1 = polarXY(mca, R * 0.20), mp2 = polarXY(mca, R * 0.80);
  ctx.beginPath(); ctx.moveTo(mp1.x, mp1.y); ctx.lineTo(mp2.x, mp2.y);
  ctx.strokeStyle = cc + '70'; ctx.lineWidth = 1.5;
  ctx.setLineDash([4, 3]); ctx.stroke(); ctx.setLineDash([]);

  // Center
  ctx.beginPath(); ctx.arc(CX, CY, R * 0.16, 0, 2*Math.PI);
  const cg = ctx.createRadialGradient(CX, CY, 0, CX, CY, R * 0.16);
  cg.addColorStop(0, cc + '20'); cg.addColorStop(1, 'transparent');
  ctx.fillStyle = cg; ctx.fill();
  ctx.strokeStyle = cc + '40'; ctx.lineWidth = 1; ctx.stroke();
  ctx.font = '11px Georgia'; ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
  ctx.fillStyle = cc + 'aa'; ctx.fillText(child.name, CX, CY);
}

function attachWheelListeners() {
  const canvas = document.getElementById('wheel');
  const tip    = document.getElementById('tip');
  if (!canvas || !tip) return;

  canvas.addEventListener('mousemove', e => {
    const child = CHILDREN[active];
    const rect  = canvas.getBoundingClientRect();
    const mx = (e.clientX - rect.left) * (W / rect.width);
    const my = (e.clientY - rect.top)  * (H / rect.height);
    const hit = child.planets.find(p => p._cx && Math.hypot(mx - p._cx, my - p._cy) < p._r + 4);
    if (!hit) { tip.style.display = 'none'; return; }
    const s   = signOf(hit.lon);
    const deg = Math.round(((hit.lon % 360) + 360) % 360 % 30);
    const gl  = PLANET_GLYPHS[hit.name] || '';
    tip.innerHTML = `
      <div class="tp-name">${gl} ${hit.name}${hit.rx ? ' <span style="color:#e05c5c;font-size:11px">℞</span>' : ''}</div>
      <div class="tp-pos">${deg}° ${s.name} ${s.glyphE}</div>
      <div class="tp-house">${hit.house} House · ${s.element[0].toUpperCase()+s.element.slice(1)}</div>`;
    const wrap = document.getElementById('wheel-wrap').getBoundingClientRect();
    tip.style.display = 'block';
    tip.style.left = (e.clientX - wrap.left + 16) + 'px';
    tip.style.top  = (e.clientY - wrap.top  - 20) + 'px';
  });
  canvas.addEventListener('mouseleave', () => { tip.style.display = 'none'; });
}

// ─────────────────────────────────────────────
//  Live planetary positions (Paul Schlyter method)
// ─────────────────────────────────────────────
function calcSkyNow(date) {
  const Y = date.getUTCFullYear(), Mo = date.getUTCMonth()+1, D = date.getUTCDate();
  const UT = date.getUTCHours() + date.getUTCMinutes()/60 + date.getUTCSeconds()/3600;
  const JD = 367*Y - Math.floor(7*(Y+Math.floor((Mo+9)/12))/4)
           + Math.floor(275*Mo/9) + D + 1721013.5 + UT/24;
  const d = JD - 2451543.5;

  const PI = Math.PI, r2d = 180/PI, d2r = PI/180;
  const rev = a => ((a % 360) + 360) % 360;

  function kepler(M, e) {
    let E = M * d2r;
    for (let i = 0; i < 80; i++) {
      const dE = (M*d2r - E + e*Math.sin(E)) / (1 - e*Math.cos(E));
      E += dE;
      if (Math.abs(dE) < 1e-9) break;
    }
    return E;
  }

  function helio(N, inc, w, a, e, M) {
    M = rev(M);
    const E = kepler(M, e);
    const xv = a*(Math.cos(E)-e), yv = a*Math.sqrt(1-e*e)*Math.sin(E);
    const v = Math.atan2(yv, xv)*r2d;
    const rv = Math.sqrt(xv*xv+yv*yv);
    const Nr=N*d2r, ir=inc*d2r, wr=w*d2r, vr=(v+w)*d2r;
    return {
      xh: rv*(Math.cos(Nr)*Math.cos(vr) - Math.sin(Nr)*Math.sin(vr)*Math.cos(ir)),
      yh: rv*(Math.sin(Nr)*Math.cos(vr) + Math.cos(Nr)*Math.sin(vr)*Math.cos(ir)),
    };
  }

  // Sun (Earth orbit → geocentric Sun)
  const sw = rev(282.9404 + 4.70935e-5*d);
  const se = 0.016709 - 1.151e-9*d;
  const sm = rev(356.0470 + 0.9856002585*d);
  const sE = kepler(sm, se);
  const sxv = Math.cos(sE)-se, syv = Math.sqrt(1-se*se)*Math.sin(sE);
  const sv = Math.atan2(syv, sxv)*r2d;
  const slon = rev(sv+sw);
  const sr = Math.sqrt(sxv*sxv+syv*syv);
  const xs = sr*Math.cos(slon*d2r), ys = sr*Math.sin(slon*d2r);

  function geoLon(N, inc, w, a, e, M) {
    const {xh, yh} = helio(N, inc, w, a, e, M);
    return rev(Math.atan2(yh+ys, xh+xs)*r2d);
  }

  // Moon (geocentric with main perturbations)
  const MN = rev(125.1228 - 0.0529538083*d);
  const Mw = rev(318.0634 + 0.1643573223*d);
  const MM = rev(115.3654 + 13.0649929509*d);
  const ME = kepler(MM, 0.054900);
  const Mxv = 60.2666*(Math.cos(ME)-0.054900);
  const Myv = 60.2666*Math.sqrt(1-0.054900*0.054900)*Math.sin(ME);
  const Mv = Math.atan2(Myv, Mxv)*r2d;
  const Mr = Math.sqrt(Mxv*Mxv+Myv*Myv);
  const Mvr = (Mv+Mw)*d2r, MNr = MN*d2r, Mir = 5.1454*d2r;
  const Mxh = Mr*(Math.cos(MNr)*Math.cos(Mvr) - Math.sin(MNr)*Math.sin(Mvr)*Math.cos(Mir));
  const Myh = Mr*(Math.sin(MNr)*Math.cos(Mvr) + Math.cos(MNr)*Math.sin(Mvr)*Math.cos(Mir));
  const Mlon_raw = rev(Math.atan2(Myh, Mxh)*r2d);
  // Perturbations (Meeus simplified)
  const Lm = rev(MN + Mw + MM), Ls = slon, Ms = sm;
  const Dd = rev(Lm - Ls), Fm = MM;
  const moonLon = rev(Mlon_raw
    - 1.274*Math.sin((Fm - 2*Dd)*d2r)
    + 0.658*Math.sin(2*Dd*d2r)
    - 0.186*Math.sin(Ms*d2r)
    - 0.059*Math.sin((2*Fm - 2*Dd)*d2r)
    - 0.057*Math.sin((Fm - 2*Dd + Ms)*d2r)
    + 0.053*Math.sin((Fm + 2*Dd)*d2r)
    + 0.046*Math.sin((2*Dd - Ms)*d2r)
    + 0.041*Math.sin((Fm - Ms)*d2r)
    - 0.035*Math.sin(Dd*d2r)
    - 0.031*Math.sin((Fm + Ms)*d2r));

  // North Node (mean)
  const nodeRaw = rev(125.0445 - 0.0529538083*d);

  // Detect retrograde: compare longitude +1 day
  function geoLon1(N,inc,w,a,e,M,dOff) {
    const d2=d+dOff;
    const sw2=rev(282.9404+4.70935e-5*d2), se2=0.016709-1.151e-9*d2, sm2=rev(356.0470+0.9856002585*d2);
    const sE2=kepler(sm2,se2);
    const xs2=Math.sqrt((Math.cos(sE2)-se2)**2+(Math.sqrt(1-se2*se2)*Math.sin(sE2))**2)*Math.cos(rev(Math.atan2(Math.sqrt(1-se2*se2)*Math.sin(sE2),Math.cos(sE2)-se2)*r2d+sw2)*d2r);
    const ys2=Math.sqrt((Math.cos(sE2)-se2)**2+(Math.sqrt(1-se2*se2)*Math.sin(sE2))**2)*Math.sin(rev(Math.atan2(Math.sqrt(1-se2*se2)*Math.sin(sE2),Math.cos(sE2)-se2)*r2d+sw2)*d2r);
    const {xh,yh}=helio(rev(N+dOff*(N-rev(N-1))/1),inc,w,a,e,rev(M+dOff*(M-rev(M-1))/1));
    // simpler: just re-run with adjusted M
    return rev(Math.atan2(yh+ys2,xh+xs2)*r2d);
  }

  function isRx(lon0, lon1) {
    let diff = lon1 - lon0;
    if (diff > 180) diff -= 360;
    if (diff < -180) diff += 360;
    return diff < 0;
  }

  // Compute retrograde by checking motion over ±1 day
  function planetEntry(name, lon, lonPrev) {
    const rx = isRx(lonPrev, lon);
    const deg = Math.floor(((lon%30)+30)%30);
    const signIdx = Math.floor(((lon%360)+360)%360 / 30);
    const sign = SIGN_NAMES[signIdx];
    const glyphE = SIGN_GLYPHS_E[signIdx];
    return { name, lon, deg, sign, glyphE, rx };
  }

  // Planet lons today and yesterday (for Rx detection)
  const pData = [
    { name:'Sun',        lon: slon,  lonY: rev(Math.atan2(sr*Math.sin(rev(sv+sw-0.9856002585)*d2r), sr*Math.cos(rev(sv+sw-0.9856002585)*d2r))*r2d) },
    { name:'Moon',       lon: moonLon, lonY: rev(moonLon - 13.176) },
    { name:'Mercury',    lon: geoLon(rev(48.3313+3.24587e-5*d),7.0047+5e-8*d,rev(29.1241+1.01444e-5*d),0.387098,0.205635+5.59e-10*d,rev(168.6562+4.0923344368*d)),
                         lonY: geoLon(rev(48.3313+3.24587e-5*(d-1)),7.0047+5e-8*(d-1),rev(29.1241+1.01444e-5*(d-1)),0.387098,0.205635+5.59e-10*(d-1),rev(168.6562+4.0923344368*(d-1))) },
    { name:'Venus',      lon: geoLon(rev(76.6799+2.46590e-5*d),3.3946+2.75e-8*d,rev(54.8910+1.38374e-5*d),0.723330,0.006773-1.302e-9*d,rev(48.0052+1.6021302244*d)),
                         lonY: geoLon(rev(76.6799+2.46590e-5*(d-1)),3.3946,rev(54.8910+1.38374e-5*(d-1)),0.723330,0.006773,rev(48.0052+1.6021302244*(d-1))) },
    { name:'Mars',       lon: geoLon(rev(49.5574+2.11081e-5*d),1.8497,rev(286.5016+2.92961e-5*d),1.523688,0.093405,rev(18.6021+0.5240207766*d)),
                         lonY: geoLon(rev(49.5574+2.11081e-5*(d-1)),1.8497,rev(286.5016+2.92961e-5*(d-1)),1.523688,0.093405,rev(18.6021+0.5240207766*(d-1))) },
    { name:'Jupiter',    lon: geoLon(rev(100.4542+2.76854e-5*d),1.3030,rev(273.8777+1.64505e-5*d),5.20256,0.048498,rev(19.8950+0.0830853001*d)),
                         lonY: geoLon(rev(100.4542+2.76854e-5*(d-1)),1.3030,rev(273.8777+1.64505e-5*(d-1)),5.20256,0.048498,rev(19.8950+0.0830853001*(d-1))) },
    { name:'Saturn',     lon: geoLon(rev(113.6634+2.38980e-5*d),2.4886,rev(339.3939+2.97661e-5*d),9.55475,0.055546,rev(316.9670+0.0334442282*d)),
                         lonY: geoLon(rev(113.6634+2.38980e-5*(d-1)),2.4886,rev(339.3939+2.97661e-5*(d-1)),9.55475,0.055546,rev(316.9670+0.0334442282*(d-1))) },
    { name:'Uranus',     lon: geoLon(rev(74.0005+1.3978e-5*d),0.7733,rev(96.6612+3.0565e-5*d),19.18171,0.047318,rev(142.5905+0.011725806*d)),
                         lonY: geoLon(rev(74.0005+1.3978e-5*(d-1)),0.7733,rev(96.6612+3.0565e-5*(d-1)),19.18171,0.047318,rev(142.5905+0.011725806*(d-1))) },
    { name:'Neptune',    lon: geoLon(rev(131.7806+3.0173e-5*d),1.7700,rev(272.8461-6.027e-6*d),30.05826,0.008606,rev(260.2471+0.005995147*d)),
                         lonY: geoLon(rev(131.7806+3.0173e-5*(d-1)),1.7700,rev(272.8461-6.027e-6*(d-1)),30.05826,0.008606,rev(260.2471+0.005995147*(d-1))) },
    { name:'Pluto',      lon: rev(238.953+0.003968789*d), lonY: rev(238.953+0.003968789*(d-1)) },
    { name:'North Node', lon: nodeRaw, lonY: rev(nodeRaw+0.0529538083), rx: true }, // always Rx
  ];

  return pData.map(p => planetEntry(p.name, p.lon, p.lonY !== undefined ? p.lonY : p.lon - 0.001));
}

function renderLiveSky() {
  const child  = CHILDREN[active];
  const now    = new Date();
  const planets = calcSkyNow(now);
  const timeStr = now.toLocaleTimeString('en-US', {hour:'numeric',minute:'2-digit',hour12:true});
  const dateStr = now.toLocaleDateString('en-US', {month:'short',day:'numeric'});

  const hdrEl = document.getElementById('live-sky-hdr');
  if (hdrEl) hdrEl.innerHTML =
    `Live Sky · ${child.name} &nbsp;<span style="font-size:9px;color:var(--muted);font-weight:normal;text-transform:none;letter-spacing:0">${dateStr} · ${timeStr}</span>`;

  const planetRows = planets.map(p => {
    const gl      = PLANET_GLYPHS[p.name] || '●';
    const keyword = (SKY_MEANINGS[p.name] || {})[p.sign] || '';
    const feel    = (SKY_FEEL[p.name]    || {})[p.sign] || '';
    const rxBadge = p.rx ? '<span class="ls-rx">℞ retrograde</span>' : '';
    const house   = getTransitHouse(p.lon, child.ascLon);
    const hTheme  = TRANSIT_HOUSE_THEME[house] || '';
    const verb    = PLANET_TRANSIT_VERB[p.name] || 'activates';
    const specific = (PLANET_HOUSE_TRANSIT[p.name] || {})[house] || '';
    return `<div class="ls-row">
      <span class="ls-glyph">${gl}</span>
      <div class="ls-body">
        <div class="ls-name">${p.name}<span class="ls-domain">${PLANET_DOMAIN[p.name] || ''}</span></div>
        <div class="ls-pos">${p.deg}° ${p.sign}${rxBadge}</div>
        ${keyword ? `<div class="ls-key">${keyword}</div>` : ''}
        ${feel    ? `<div class="ls-feel">${feel}</div>`   : ''}
        <div class="ls-house-badge">In ${child.name}'s <strong>${house} House</strong> — ${hTheme}</div>
        ${specific ? `<div class="ls-house-transit">${PLANET_GLYPHS[p.name]||''} ${verb} ${hTheme.split(',')[0]} — ${specific}</div>` : ''}
      </div>
    </div>`;
  }).join('');

  const aspects = calcAspects(planets);
  const aspectRows = aspects.length ? `
    <div class="section-hdr" id="aspects-toggle" style="border-top:1px solid rgba(255,255,255,0.08);border-radius:0">
      <span style="font-size:9px;letter-spacing:2px">Active Aspects · Orbital Closeness</span>
      <span class="section-arrow">▾</span>
    </div>
    <div class="section-body" id="aspects-body">
    ${aspects.map(a => {
      const g1 = PLANET_GLYPHS[a.p1.name] || '●';
      const g2 = PLANET_GLYPHS[a.p2.name] || '●';
      const tightness = a.orb < 1 ? 'exact' : a.orb < 3 ? 'tight' : 'wide';
      const orbMeaning = a.orb < 1
        ? `${a.orb}° orb — exact. This is at peak strength right now. The effect is as strong as it gets.`
        : a.orb < 3
        ? `${a.orb}° orb — tight. This is active and strong today. You will likely feel it.`
        : `${a.orb}° orb — wide. This is building or fading. Present but not at full intensity.`;
      return `<div class="ls-asp-row">
        <div class="ls-asp-head">
          <span class="ls-asp-planets">${g1} ${a.p1.name} <span class="ls-asp-sym">${a.asp.symbol}</span> ${g2} ${a.p2.name}</span>
          <span class="ls-asp-meta">${a.asp.name} · ${a.asp.quality}</span>
        </div>
        <div class="ls-asp-activation">Activating: <strong>${a.activation}</strong></div>
        <div class="ls-asp-feel">${a.asp.feel}</div>
        <div class="ls-asp-orb">${orbMeaning}</div>
      </div>`;
    }).join('')}</div>` : '';

  document.getElementById('live-sky-grid').innerHTML = planetRows + aspectRows;

  const aTog = document.getElementById('aspects-toggle');
  const aBody = document.getElementById('aspects-body');
  if (aTog && aBody) {
    aTog.addEventListener('click', () => {
      const open = aBody.classList.toggle('open');
      aTog.classList.toggle('open', open);
    });
  }
}

// ─────────────────────────────────────────────
//  Galaxy background
// ─────────────────────────────────────────────
(function drawGalaxy() {
  const c  = document.getElementById('space-bg');
  const cx = c.getContext('2d');
  const rng = (function(seed) {
    let s = seed;
    return () => { s = Math.sin(s + 1.6180339887) * 99999; return s - Math.floor(s); };
  })(7);

  function resize() { c.width = window.innerWidth; c.height = window.innerHeight; draw(); }

  function draw() {
    const W = c.width, H = c.height;
    cx.clearRect(0, 0, W, H);

    // Pure black base
    cx.fillStyle = '#000';
    cx.fillRect(0, 0, W, H);

    // ── Galaxy core glow (centre-left, feels like Milky Way centre) ──
    const gx = W * 0.38, gy = H * 0.52;
    const core = cx.createRadialGradient(gx, gy, 0, gx, gy, Math.min(W,H) * 0.55);
    core.addColorStop(0,    'rgba(255,220,160,0.22)');
    core.addColorStop(0.08, 'rgba(200,140,255,0.18)');
    core.addColorStop(0.2,  'rgba(100,60,220,0.14)');
    core.addColorStop(0.4,  'rgba(30,10,100,0.10)');
    core.addColorStop(1,    'transparent');
    cx.fillStyle = core;
    cx.fillRect(0, 0, W, H);

    // ── Nebula clouds — vivid colour blobs ──
    const nebulae = [
      [W*0.15, H*0.22, W*0.28, 'rgba(168,85,247,0.18)'],   // purple top-left
      [W*0.72, H*0.18, W*0.22, 'rgba(56,189,248,0.14)'],   // cyan top-right
      [W*0.82, H*0.65, W*0.20, 'rgba(236,72,153,0.15)'],   // pink right
      [W*0.10, H*0.72, W*0.25, 'rgba(52,211,153,0.12)'],   // teal bottom-left
      [W*0.50, H*0.30, W*0.18, 'rgba(251,146,60,0.10)'],   // orange centre
      [W*0.60, H*0.80, W*0.22, 'rgba(99,102,241,0.13)'],   // indigo bottom
      [W*0.30, H*0.55, W*0.16, 'rgba(244,63,94,0.09)'],    // rose mid
      [W*0.90, H*0.40, W*0.15, 'rgba(192,132,252,0.11)'],  // violet far-right
    ];
    nebulae.forEach(([nx, ny, nr, col]) => {
      const ng = cx.createRadialGradient(nx, ny, 0, nx, ny, nr);
      ng.addColorStop(0,   col);
      ng.addColorStop(0.5, col.replace(/[\d.]+\)$/, v => String(parseFloat(v)*0.4)+')'));
      ng.addColorStop(1,   'transparent');
      cx.fillStyle = ng;
      cx.beginPath(); cx.arc(nx, ny, nr, 0, Math.PI*2); cx.fill();
    });

    // ── Milky Way dust band (diagonal streak of faint stars) ──
    cx.save();
    cx.globalAlpha = 0.07;
    const band = cx.createLinearGradient(0, H*0.1, W, H*0.9);
    band.addColorStop(0,   'transparent');
    band.addColorStop(0.3, 'rgba(180,160,255,1)');
    band.addColorStop(0.5, 'rgba(255,240,200,1)');
    band.addColorStop(0.7, 'rgba(160,200,255,1)');
    band.addColorStop(1,   'transparent');
    cx.fillStyle = band;
    cx.fillRect(0, 0, W, H);
    cx.restore();

    // ── Stars — dense field ──
    // tiny dim stars (background)
    for (let i = 0; i < 500; i++) {
      const sx = rng()*W, sy = rng()*H, sr = rng()*0.8+0.15, sa = rng()*0.4+0.2;
      cx.beginPath(); cx.arc(sx, sy, sr, 0, Math.PI*2);
      cx.fillStyle = `rgba(255,255,255,${sa})`; cx.fill();
    }
    // medium white stars
    for (let i = 0; i < 160; i++) {
      const sx = rng()*W, sy = rng()*H, sr = rng()*1.2+0.4, sa = rng()*0.5+0.4;
      cx.beginPath(); cx.arc(sx, sy, sr, 0, Math.PI*2);
      cx.fillStyle = `rgba(255,255,255,${sa})`; cx.fill();
    }
    // coloured stars — blue, gold, rose, teal
    const starCols = [
      'rgba(147,197,253,',  // blue
      'rgba(253,224,71,',   // gold
      'rgba(249,168,212,',  // rose
      'rgba(110,231,183,',  // teal
      'rgba(216,180,254,',  // purple
    ];
    for (let i = 0; i < 80; i++) {
      const sx = rng()*W, sy = rng()*H, sr = rng()*1.4+0.5, sa = rng()*0.55+0.35;
      const col = starCols[Math.floor(rng()*starCols.length)];
      cx.beginPath(); cx.arc(sx, sy, sr, 0, Math.PI*2);
      cx.fillStyle = col + sa + ')'; cx.fill();
    }
    // bright hero stars with cross-flare
    for (let i = 0; i < 22; i++) {
      const sx = rng()*W, sy = rng()*H, sr = rng()*1.6+1.2;
      const col = starCols[Math.floor(rng()*starCols.length)];
      cx.beginPath(); cx.arc(sx, sy, sr, 0, Math.PI*2);
      cx.fillStyle = col + '0.9)'; cx.fill();
      cx.strokeStyle = col + '0.25)'; cx.lineWidth = 0.6;
      cx.beginPath(); cx.moveTo(sx-sr*4,sy); cx.lineTo(sx+sr*4,sy); cx.stroke();
      cx.beginPath(); cx.moveTo(sx,sy-sr*4); cx.lineTo(sx,sy+sr*4); cx.stroke();
    }

    // ── Extra colour washes over nebula areas ──
    [
      [W*0.25, H*0.15, W*0.12, 'rgba(224,231,255,0.06)'],
      [W*0.65, H*0.55, W*0.14, 'rgba(253,186,116,0.06)'],
    ].forEach(([nx, ny, nr, col]) => {
      const g2 = cx.createRadialGradient(nx, ny, 0, nx, ny, nr);
      g2.addColorStop(0, col); g2.addColorStop(1, 'transparent');
      cx.fillStyle = g2; cx.beginPath(); cx.arc(nx, ny, nr, 0, Math.PI*2); cx.fill();
    });
  }

  window.addEventListener('resize', resize);
  resize();
})();
</script>
